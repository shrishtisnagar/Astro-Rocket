media:
  input: public/images/projects
  output: /images/projects

content:
  - name: projects
    label: Case Studies
    type: collection
    path: src/content/projects
    extension: mdx
    format: yaml-frontmatter
    view:
      fields: [title, category, draft]
    fields:
      - name: title
        label: Title
        type: string
        required: true

      - name: description
        label: Short Description
        type: string
        required: true

      - name: category
        label: Category
        type: select
        required: true
        options:
          values:
            - LinkedIn
            - Instagram
            - Blogs
            - Print Media
            - Landing Pages

      - name: subcategories
        label: Subcategory Tags (comma-separated, e.g. B2B, Outreach)
        type: string

      - name: url
        label: Case Study Link (Notion or external)
        type: string

      - name: imageUrl
        label: Cover Image
        type: image

      - name: featured
        label: Show in "Projects I'm Proud of"
        type: boolean
        default: false

      - name: order
        label: Display Order (lower = first)
        type: number
        default: 99

      - name: draft
        label: Hide from site (draft)
        type: boolean
        default: false

      - name: body
        label: Case Study Content (optional — if filled, clicking the card opens this page instead of the external link)
        type: rich-text
