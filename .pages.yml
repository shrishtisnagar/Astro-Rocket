media:
  input: public/images
  output: /images

content:
  - name: testimonials
    label: Testimonials
    type: collection
    path: src/content/testimonials
    format: yaml-frontmatter
    view:
      fields: [author, title, row]
    fields:
      - name: quote
        label: Quote
        type: string
        required: true

      - name: author
        label: Name
        type: string
        required: true

      - name: title
        label: Title / Company
        type: string

      - name: avatar
        label: Profile Photo
        type: image

      - name: row
        label: Row (1 = top, 2 = bottom)
        type: number
        required: true
        default: 1

      - name: order
        label: Order within row (1 = first)
        type: number
        default: 99

  - name: projects
    label: Case Studies
    type: collection
    path: src/content/projects
    format: yaml-frontmatter
    view:
      fields: [title, category, draft]
    fields:
      - name: title
        label: Title
        type: string
        required: true

      - name: description
        label: Short Description
        type: string
        required: true

      - name: category
        label: Category
        type: select
        required: true
        options:
          values:
            - LinkedIn
            - Instagram
            - Blogs
            - Print Media
            - Landing Pages

      - name: subcategories
        label: Subcategory Tags (comma-separated, e.g. B2B, Outreach)
        type: string

      - name: url
        label: Case Study Link (Notion or external)
        type: string

      - name: imageUrl
        label: Cover Image
        type: image

      - name: featured
        label: Show in "Projects I'm Proud of"
        type: boolean
        default: false

      - name: order
        label: Display Order (lower = first)
        type: number
        default: 99

      - name: draft
        label: Hide from site (draft)
        type: boolean
        default: false

      - name: body
        label: Case Study Content (optional — if filled, clicking the card opens this page instead of the external link)
        type: rich-text

  - name: products
    label: Resources & Products
    type: collection
    path: src/content/products
    format: yaml-frontmatter
    view:
      fields: [title, type, price, draft]
    fields:
      - name: title
        label: Product Title
        type: string
        required: true

      - name: type
        label: Type Label (e.g. "Video Meeting · 60 mins" or "Digital Product")
        type: string
        required: true

      - name: typeIcon
        label: Type Icon
        type: select
        required: true
        options:
          values:
            - { label: "Video Meeting", value: video }
            - { label: "Digital Product / File", value: file }

      - name: description
        label: Description
        type: string
        required: true

      - name: price
        label: "Price (₹) — enter 0 for Free, leave blank for Contact"
        type: number

      - name: originalPrice
        label: "Original / Crossed-out Price (₹)"
        type: number

      - name: rating
        label: Star Rating (1–5, optional)
        type: number

      - name: image
        label: Product Image
        type: image

      - name: checkoutUrl
        label: Fallback Checkout / Booking URL
        type: string
        required: true

      - name: duration
        label: "Session duration in minutes (video meetings only, e.g. 60 or 30)"
        type: number

      - name: schedule
        label: Availability Schedule (video meetings only)
        type: object
        fields:
          - name: timezone
            label: "Timezone (e.g. Asia/Kolkata)"
            type: string
            default: Asia/Kolkata

          - name: daysAhead
            label: How many days ahead to show
            type: number
            default: 14

          - name: monday
            label: "Monday — available start times (24h, e.g. \"10:00\", \"14:00\")"
            type: list
            item:
              type: string

          - name: tuesday
            label: Tuesday — available start times
            type: list
            item:
              type: string

          - name: wednesday
            label: Wednesday — available start times
            type: list
            item:
              type: string

          - name: thursday
            label: Thursday — available start times
            type: list
            item:
              type: string

          - name: friday
            label: Friday — available start times
            type: list
            item:
              type: string

          - name: saturday
            label: Saturday — available start times (leave empty to block)
            type: list
            item:
              type: string

          - name: sunday
            label: Sunday — available start times (leave empty to block)
            type: list
            item:
              type: string

      - name: badge
        label: "Badge Text (e.g. Most Popular, Free) — optional"
        type: string

      - name: features
        label: Feature List
        type: list
        item:
          type: string

      - name: order
        label: Display Order (lower number = shown first)
        type: number
        default: 99

      - name: draft
        label: Hide from site (draft mode)
        type: boolean
        default: false
